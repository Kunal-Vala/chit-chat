version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      # IMPORTANT: If your backend uses environment variables like MongoDB URI or Cloudinary keys, 
      # you must specify them here or load them from an .env file.
      # You can uncomment the line below and place a .env file in the root, or define them directly here.
    env_file:
      - ./backend/.env.production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
